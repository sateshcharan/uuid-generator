kind = "web"
previewPath = "/"
title = "UUID Generator"
version = "1.0.0"
id = "artifacts/uuid-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20465

[services.development]
run = "pnpm --filter @workspace/uuid-generator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/uuid-generator", "run", "build" ]
publicDir = "artifacts/uuid-generator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20465"
BASE_PATH = "/"
